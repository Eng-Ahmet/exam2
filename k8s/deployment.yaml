apiVersion: apps/v1
kind: Deployment
metadata:
  name: mundial2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mundial2026
  template:
    metadata:
      labels:
        app: mundial2026
    spec:
      containers:
      - name: mundial2026
        image: mundial2026:v1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: mundial2026-config 